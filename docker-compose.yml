version: "3.9"

# Local development stack: infra + all microservices.
# For production, services run on EKS; infra is replaced by RDS/MSK/ElastiCache.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: connectedcars
      POSTGRES_PASSWORD: connectedcars
      POSTGRES_DB: connectedcars
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connectedcars"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  kafka:
    image: bitnami/kafka:3.7
    ports: ["9092:9092"]
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      ALLOW_PLAINTEXT_LISTENER: "yes"

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    depends_on: { postgres: { condition: service_healthy } }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/connectedcars
      JWT_SECRET: local-dev-secret-change-me-please-32bytes-min
    ports: ["8081:8081"]

  vehicle-telemetry-service:
    build:
      context: .
      dockerfile: services/vehicle-telemetry-service/Dockerfile
    depends_on: [kafka, postgres]
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/connectedcars
    ports: ["8082:8082"]

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    depends_on: [kafka, redis]
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
    ports: ["8083:8083"]

  fleet-management-service:
    build:
      context: .
      dockerfile: services/fleet-management-service/Dockerfile
    depends_on: { postgres: { condition: service_healthy } }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/connectedcars
    ports: ["8084:8084"]

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    depends_on: [auth-service, vehicle-telemetry-service, fleet-management-service]
    environment:
      AUTH_SERVICE_URI: http://auth-service:8081
      TELEMETRY_SERVICE_URI: http://vehicle-telemetry-service:8082
      FLEET_SERVICE_URI: http://fleet-management-service:8084
      JWT_SECRET: local-dev-secret-change-me-please-32bytes-min
    ports: ["8080:8080"]

volumes:
  pgdata:
