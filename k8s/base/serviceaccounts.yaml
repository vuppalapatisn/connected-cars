# One ServiceAccount per workload. This is the cornerstone of BOTH:
#   1. Istio identity  — the SPIFFE identity in the mTLS cert is derived from the
#      ServiceAccount:  spiffe://<trust-domain>/ns/connected-cars/sa/<sa-name>
#      AuthorizationPolicies reference these identities as principals.
#   2. AWS IAM (IRSA)  — annotate the SA with an IAM role ARN so pods get scoped
#      AWS credentials with NO long-lived keys.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: connected-cars
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service
  namespace: connected-cars
  annotations:
    # IRSA: pod assumes this IAM role to read the JWT secret from Secrets Manager.
    eks.amazonaws.com/role-arn: arn:aws:iam::111122223333:role/connected-cars-auth-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vehicle-telemetry-service
  namespace: connected-cars
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::111122223333:role/connected-cars-telemetry
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-service
  namespace: connected-cars
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::111122223333:role/connected-cars-notification
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fleet-management-service
  namespace: connected-cars
