apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: connected-cars
  labels: { app: auth-service, version: v1 }
spec:
  replicas: 2
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service, version: v1 }
    spec:
      serviceAccountName: auth-service
      containers:
        - name: auth-service
          image: ghcr.io/vuppalapatisn/connected-cars/auth-service:1.0.0
          ports: [{ containerPort: 8081 }]
          envFrom:
            - configMapRef: { name: platform-config }
          env:
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: platform-secrets, key: JWT_SECRET } }
            - name: SPRING_DATASOURCE_URL
              valueFrom: { secretKeyRef: { name: platform-secrets, key: SPRING_DATASOURCE_URL } }
            - name: DB_USERNAME
              valueFrom: { secretKeyRef: { name: platform-secrets, key: DB_USERNAME } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: platform-secrets, key: DB_PASSWORD } }
          resources:
            requests: { cpu: "250m", memory: "384Mi" }
            limits:   { cpu: "1",    memory: "768Mi" }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 20
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            initialDelaySeconds: 40
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: connected-cars
  labels: { app: auth-service }
spec:
  selector: { app: auth-service }
  ports:
    - name: http
      port: 8081
      targetPort: 8081
