apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-telemetry-service
  namespace: connected-cars
  labels: { app: vehicle-telemetry-service, version: v1 }
spec:
  replicas: 3
  selector:
    matchLabels: { app: vehicle-telemetry-service }
  template:
    metadata:
      labels: { app: vehicle-telemetry-service, version: v1 }
    spec:
      serviceAccountName: vehicle-telemetry-service
      containers:
        - name: vehicle-telemetry-service
          image: ghcr.io/vuppalapatisn/connected-cars/vehicle-telemetry-service:1.0.0
          ports: [{ containerPort: 8082 }]
          envFrom:
            - configMapRef: { name: platform-config }
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom: { secretKeyRef: { name: platform-secrets, key: SPRING_DATASOURCE_URL } }
            - name: DB_USERNAME
              valueFrom: { secretKeyRef: { name: platform-secrets, key: DB_USERNAME } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: platform-secrets, key: DB_PASSWORD } }
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8082 }
            initialDelaySeconds: 20
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8082 }
            initialDelaySeconds: 40
---
apiVersion: v1
kind: Service
metadata:
  name: vehicle-telemetry-service
  namespace: connected-cars
  labels: { app: vehicle-telemetry-service }
spec:
  selector: { app: vehicle-telemetry-service }
  ports:
    - name: http
      port: 8082
      targetPort: 8082
