apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: connected-cars
  labels: { app: api-gateway, version: v1 }
spec:
  replicas: 2
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway, version: v1 }   # 'app' + 'version' labels enable Istio subset routing
    spec:
      serviceAccountName: api-gateway              # Istio derives the mTLS identity from this SA
      containers:
        - name: api-gateway
          image: ghcr.io/vuppalapatisn/connected-cars/api-gateway:1.0.0
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: platform-config }
          env:
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: platform-secrets, key: JWT_SECRET } }
            - name: AUTH_SERVICE_URI
              value: "http://auth-service:8081"
            - name: TELEMETRY_SERVICE_URI
              value: "http://vehicle-telemetry-service:8082"
            - name: FLEET_SERVICE_URI
              value: "http://fleet-management-service:8084"
            - name: NOTIFICATION_SERVICE_URI
              value: "http://notification-service:8083"
          resources:
            requests: { cpu: "250m", memory: "384Mi" }
            limits:   { cpu: "1",    memory: "768Mi" }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 20
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 40
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: connected-cars
  labels: { app: api-gateway }
spec:
  selector: { app: api-gateway }
  ports:
    - name: http                                  # Istio requires named ports (http/grpc/tcp) for L7 features
      port: 8080
      targetPort: 8080
