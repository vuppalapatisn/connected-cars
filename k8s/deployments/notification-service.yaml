apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: connected-cars
  labels: { app: notification-service, version: v1 }
spec:
  replicas: 2
  selector:
    matchLabels: { app: notification-service }
  template:
    metadata:
      labels: { app: notification-service, version: v1 }
    spec:
      serviceAccountName: notification-service
      containers:
        - name: notification-service
          image: ghcr.io/vuppalapatisn/connected-cars/notification-service:1.0.0
          ports: [{ containerPort: 8083 }]
          envFrom:
            - configMapRef: { name: platform-config }
          resources:
            requests: { cpu: "250m", memory: "384Mi" }
            limits:   { cpu: "1",    memory: "768Mi" }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8083 }
            initialDelaySeconds: 20
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8083 }
            initialDelaySeconds: 40
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: connected-cars
  labels: { app: notification-service }
spec:
  selector: { app: notification-service }
  ports:
    - name: http
      port: 8083
      targetPort: 8083
