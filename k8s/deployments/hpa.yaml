# Horizontal Pod Autoscalers — scale on CPU. Telemetry ingest is the hot path,
# so it gets the widest range. Pair with Cluster Autoscaler / Karpenter for nodes.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vehicle-telemetry-service
  namespace: connected-cars
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vehicle-telemetry-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 65 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: connected-cars
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
# Keep at least one gateway pod during voluntary disruptions (node drains, upgrades).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: connected-cars
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: api-gateway }
