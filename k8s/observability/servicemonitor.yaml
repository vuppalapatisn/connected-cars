# Prometheus Operator ServiceMonitor — scrape Spring Boot Actuator /prometheus
# from every service in the namespace. Requires kube-prometheus-stack installed.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: connected-cars-services
  namespace: connected-cars
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: ["connected-cars"]
  selector:
    matchLabels: {}          # all services in the namespace
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
