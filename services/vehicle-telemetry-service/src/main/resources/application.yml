server:
  port: 8082

spring:
  application:
    name: vehicle-telemetry-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:telemetry;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:connectedcars}
    password: ${DB_PASSWORD:connectedcars}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true

app:
  kafka:
    telemetry-partitions: 6

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
