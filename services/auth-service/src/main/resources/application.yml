server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:auth;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:connectedcars}
    password: ${DB_PASSWORD:connectedcars}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true

jwt:
  secret: ${JWT_SECRET:local-dev-secret-change-me-please-32bytes-min}
  issuer: ${JWT_ISSUER:https://auth.connected-cars.toyota.com}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
