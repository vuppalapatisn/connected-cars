name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build & test
        run: mvn -B clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.xml'

  image-scan:
    needs: build-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, auth-service, vehicle-telemetry-service, notification-service, fleet-management-service]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -f services/${{ matrix.service }}/Dockerfile -t local/${{ matrix.service }}:ci .

      # Install the Trivy CLI directly (latest) — avoids the trivy-action composite
      # action, whose pinned internal setup-trivy ref can break independently.
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Trivy vulnerability scan
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 --no-progress --ignore-unfixed local/${{ matrix.service }}:ci
